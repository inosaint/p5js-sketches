<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>p5.js Sketches</title>
    <style>
      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.4;
        padding: 24px;
        background: #f5f5f5;
        color: #111;
      }

      h1 {
        margin: 0 0 16px;
      }

      .grid {
        display: grid;
        gap: 20px;
      }

      .card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      .card h2 {
        margin: 0 0 8px;
        font-size: 1rem;
      }

      iframe {
        display: block;
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: #fff;
      }
    </style>
  </head>
  <body>
    <h1>p5.js Sketches</h1>
    <div class="grid">
      <section class="card">
        <h2>Halved Oxygen (Weather)</h2>
        <iframe
          src="./Halved_oxygen_2026_03_06_10_10_44/index.html"
          title="Halved Oxygen Weather Sketch"
          height="430"
          loading="lazy"
        ></iframe>
      </section>

      <section class="card">
        <h2>Lizard Pastry</h2>
        <iframe
          src="./Lizard_pastry_2026_03_06_10_10_47/index.html"
          title="Lizard Pastry Sketch"
          height="830"
          loading="lazy"
        ></iframe>
      </section>
    </div>
  </body>
</html>
