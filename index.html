<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>p5.js Sketches</title>
    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        color-scheme: light dark;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
        line-height: 1.4;
        padding: 24px;
        background: #f5f5f5;
        color: #111;
      }

      h1 {
        margin: 0 0 16px;
      }

      .grid {
        display: flex;
        flex-direction: row;
        align-items: flex-start;
        gap: 20px;
        overflow-x: auto;
      }

      .card {
        flex: 0 0 624px;
        width: 624px;
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
      }

      .card h2 {
        margin: 0 0 12px;
        font-size: 1rem;
      }

      .sketch-wrap {
        width: 100%;
        height: 430px;
        border: 1px solid #d8d8d8;
        border-radius: 8px;
        overflow: hidden;
        background: #fff;
      }

      iframe {
        display: block;
        width: 100%;
        height: 100%;
        border: 0;
        background: #eee;
      }
    </style>
  </head>
  <body>
    <h1>p5.js Sketches</h1>
    <div class="grid">
      <section class="card">
        <h2>Weather app</h2>
        <div class="sketch-wrap">
          <iframe
            src="./Halved_oxygen_2026_03_06_10_10_44/index.html"
            title="Weather app"
            loading="lazy"
          ></iframe>
        </div>
      </section>

      <section class="card">
        <h2>Generative Art inspired by Camille Graeser</h2>
        <div class="sketch-wrap">
          <iframe
            src="./Lizard_pastry_2026_03_06_10_10_47/index.html"
            title="Generative Art inspired by Karl Benjamin"
            loading="lazy"
          ></iframe>
        </div>
      </section>
    </div>
  </body>
</html>
